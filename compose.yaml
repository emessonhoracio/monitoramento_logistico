name: sige
services:
  database:
    container_name: sige-db
    restart: unless-stopped
    image: postgres:18.3
    shm_size: 128mb # set shared memory limit when using docker compose (https://hub.docker.com/_/postgres)
    environment:
      POSTGRES_DB: ${DB_NAME:-sige}
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-admin}
    volumes:
      - sige-db-volume:/var/lib/postgresql
    ports:
      - "5432:5432"

volumes:
  sige-db-volume: